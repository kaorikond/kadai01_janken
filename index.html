<!DOCTYPE html>
<html lang="en">
<head>
    <title>今日の晩ごはん決める君</title>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <h1>今日の晩ごはん決める君</h1>
    <p class="description">今日の気力を選ぶだけで、晩ご飯のアイデアを提案します。</p>
    
    <div class="question">今日は晩ご飯頑張れそう？</div>

    <div class="button-area">
        <button class="choice-btn" data-energy="high">できる！</button>
        <button class="choice-btn" data-energy="mid">ぼちぼち</button>
        <button class="choice-btn" data-energy="low">無理！</button>
    </div>

    <div class="result-area">
        <div id="answer-text"></div>
        <div id="menu-result"></div>
    </div>

    

    
    <script src="js/test.js"></script>
</body>
</html>
